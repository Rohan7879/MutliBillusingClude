<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Bills — MandiBook</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"/>
  <script src="js/core/firebase-init.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/features/company-profile.js"></script>
  <script src="js/features/bill-list.js" defer></script>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <link rel="icon" href="assets/logo.jpg" type="image/x-icon"/>
  <style>
  /* =========================================
     TOP NAVBAR
  ========================================= */
  *,*::before,*::after{box-sizing:border-box;}
  .top-navbar{
    position:sticky;top:0;z-index:1000;
    background:linear-gradient(135deg,#003d6e,#005a9e);
    box-shadow:0 4px 20px rgba(0,62,110,.35);
    display:flex;align-items:center;justify-content:space-between;
    height:62px;padding:0 24px;
    margin:-20px -16px 24px;
  }
  .navbar-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .navbar-brand img{height:38px;border-radius:8px;border:2px solid rgba(255,255,255,.3);}
  .navbar-brand span{color:#fff;font-size:1.1em;font-weight:800;letter-spacing:.2px;}
  .navbar-links{display:flex;gap:4px;align-items:center;flex-wrap:nowrap;}
  .nav-link{
    display:flex;align-items:center;gap:6px;
    padding:7px 13px;border-radius:8px;
    color:rgba(255,255,255,.85);font-size:13px;font-weight:600;
    text-decoration:none;border:none;background:transparent;
    cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;
  }
  .nav-link:hover,.nav-link.active{background:rgba(255,255,255,.18);color:#fff;}
  .nav-conn{
    display:flex;align-items:center;gap:7px;
    padding:6px 13px;border-radius:20px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.1);
    color:#fff;font-size:12px;font-weight:700;
    cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .nav-conn:hover{background:rgba(255,255,255,.2);}
  .cdot{width:8px;height:8px;border-radius:50%;background:#ffc107;transition:background .3s;}
  .cdot.ok{background:#28a745;}
  .cdot.err{background:#dc3545;}

  /* =========================================
     PAGE & CARDS
  ========================================= */
  .pg{max-width:880px;margin:0 auto;}

  /* Quick nav */
  .qnav{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px;}
  .qcard{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;padding:18px 12px;border-radius:14px;
    color:#fff;font-weight:700;font-size:13px;
    border:none;cursor:pointer;font-family:inherit;
    transition:all .22s;box-shadow:0 4px 14px rgba(0,0,0,.14);
    text-decoration:none;text-align:center;line-height:1.3;
  }
  .qcard:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.2);}
  .qcard .ci{font-size:26px;}
  .qcard.c-new  {background:linear-gradient(135deg,#005a9e,#003d6e);}
  .qcard.c-bills{background:linear-gradient(135deg,#28a745,#1e7e34);}
  .qcard.c-dash {background:linear-gradient(135deg,#6f42c1,#5a32a3);}
  .qcard.c-ledg {background:linear-gradient(135deg,#17a2b8,#117a8b);}
  .qcard.c-set  {background:linear-gradient(135deg,#6c757d,#495057);}

  /* ── Landing Hero ── */
  .landing-hero {
    display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(135deg,#003d6e,#005a9e);
    border-radius:18px; padding:24px 28px; margin-bottom:18px;
    color:#fff; gap:20px;
    box-shadow:0 6px 24px rgba(0,62,110,.25);
    position:relative; overflow:hidden;
  }
  .landing-hero::before {
    content:""; position:absolute; right:-40px; top:-40px;
    width:200px; height:200px; border-radius:50%;
    background:rgba(255,255,255,.06);
  }
  .landing-hero::after {
    content:""; position:absolute; right:40px; bottom:-60px;
    width:150px; height:150px; border-radius:50%;
    background:rgba(255,255,255,.04);
  }
  .hero-greeting { font-size:14px; color:rgba(255,255,255,.75); font-weight:600; margin-bottom:4px; }
  .hero-title    { font-size:2em; font-weight:900; letter-spacing:-.5px; margin-bottom:2px; }
  .hero-sub      { font-size:13px; color:rgba(255,255,255,.7); margin-bottom:16px; }
  .hero-stats    { display:flex; gap:20px; }
  .hstat         { display:flex; flex-direction:column; align-items:center; }
  .hstat-val     { font-size:1.5em; font-weight:800; color:#fff; }
  .hstat-label   { font-size:10px; color:rgba(255,255,255,.65); font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
  .hero-right    { text-align:right; flex-shrink:0; position:relative; z-index:1; }
  .hero-date     { font-size:13px; color:rgba(255,255,255,.75); font-weight:600; }
  .hero-time     { font-size:2.2em; font-weight:900; letter-spacing:1px; font-variant-numeric:tabular-nums; }

  /* 5 cards in qnav */
  .qnav{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:20px;}

  /* Section card */
  .sc{
    background:#fff;border-radius:14px;padding:22px 24px;
    margin-bottom:18px;border:1px solid #dee2e6;
    box-shadow:0 2px 10px rgba(0,90,158,.07);
  }
  .sc-title{
    display:flex;align-items:center;gap:9px;
    font-size:.9em;font-weight:800;color:#005a9e;
    margin:0 0 18px;padding-bottom:11px;
    border-bottom:2px solid #e7f3ff;
    text-transform:uppercase;letter-spacing:.5px;
  }

  /* =========================================
     FORM LAYOUT
  ========================================= */
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .ff label{display:block;font-weight:700;font-size:12px;color:#495057;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;}
  .ff input{
    width:100%;padding:11px 13px;border:1.5px solid #dee2e6;border-radius:8px;
    font-size:15px;font-family:inherit;background:#fafbff;
    transition:border-color .2s,box-shadow .2s;box-sizing:border-box;
  }
  .ff input:focus{border-color:#005a9e;box-shadow:0 0 0 3px rgba(0,90,158,.1);outline:none;background:#fff;}

  /* Toggle row */
  .trow{
    display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px;background:#f0f6ff;border-radius:9px;
    margin-bottom:10px;border:1.5px solid #cfe0ff;
  }
  .trow-label{font-weight:700;color:#003d6e;font-size:14px;display:flex;align-items:center;gap:7px;}
  .trow-label .badge{background:#dc3545;color:#fff;font-size:11px;font-weight:800;padding:2px 7px;border-radius:20px;}

  /* Supply pills */
  .spills{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  .spill{
    display:flex;align-items:center;gap:6px;
    padding:8px 16px;border-radius:22px;border:2px solid #dee2e6;
    background:#fff;font-weight:700;font-size:13px;
    cursor:pointer;transition:all .2s;color:#495057;
  }
  .spill input[type=radio]{display:none;}
  .spill:has(input:checked){
    background:linear-gradient(135deg,#005a9e,#003d6e);
    color:#fff;border-color:#005a9e;
    box-shadow:0 3px 10px rgba(0,90,158,.28);
  }

  /* Bardan cards */
  .bgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;}
  .bcard{background:#f8f9fa;border:1.5px solid #dee2e6;border-radius:10px;padding:13px;}
  .bcard-title{font-weight:700;font-size:12px;color:#005a9e;margin-bottom:9px;text-align:center;text-transform:uppercase;letter-spacing:.3px;}
  .binputs{display:grid;grid-template-columns:1fr 1fr;gap:7px;align-items:center;}
  .binputs label{font-size:11px;font-weight:700;color:#6c757d;margin-bottom:3px;display:block;}
  .binputs input{width:100%;padding:8px 9px;border:1.5px solid #dee2e6;border-radius:7px;font-size:14px;font-family:inherit;box-sizing:border-box;text-align:center;}
  .binputs input:focus{border-color:#005a9e;outline:none;box-shadow:0 0 0 2px rgba(0,90,158,.1);}
  .bded{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px;font-size:12px;font-weight:700;color:#6c757d;}

  /* Vakal table — KEEP AS REAL TABLE for JS compatibility */
  .vt-wrap{border-radius:10px;overflow:hidden;margin-bottom:4px;}
  .vt{width:100%;border-collapse:collapse;}
  .vt thead tr{background:#005a9e;}
  .vt th{color:#fff;padding:10px 11px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.3px;}
  .vt td{padding:9px 11px;border-bottom:1px solid #f0f0f0;text-align:center;background:#fff;}
  .vt tbody tr:hover td{background:#f0f6ff;}
  .vt td:first-child{font-weight:800;color:#005a9e;font-size:13px;text-align:left;}
  .vt input{width:100%;padding:8px 9px;border:1.5px solid #dee2e6;border-radius:7px;font-size:14px;font-family:inherit;text-align:center;box-sizing:border-box;}
  .vt input:focus{border-color:#005a9e;outline:none;box-shadow:0 0 0 2px rgba(0,90,158,.1);}

  /* Total bags */
  .tbag{
    display:flex;align-items:center;justify-content:center;gap:10px;
    background:linear-gradient(135deg,#e7f3ff,#cfe0ff);
    border:2px solid #b3d4f5;border-radius:11px;
    padding:9px 18px;font-weight:800;font-size:1.15em;
    color:#003d6e;margin:10px 0;
  }

  /* Generate button */
  .gen-btn{
    display:flex;align-items:center;justify-content:center;gap:9px;
    width:100%;padding:16px 22px;
    background:linear-gradient(135deg,#005a9e,#003d6e);
    color:#fff;border:none;border-radius:12px;
    font-size:17px;font-weight:800;cursor:pointer;
    transition:all .22s;font-family:inherit;
    box-shadow:0 5px 18px rgba(0,90,158,.32);margin-top:6px;
  }
  .gen-btn:hover{background:linear-gradient(135deg,#003d6e,#002550);transform:translateY(-2px);box-shadow:0 9px 26px rgba(0,90,158,.4);}

  /* Expense */
  .exp-sec{padding:16px 18px;background:#fafbff;border-radius:10px;border:1.5px solid #dee2e6;margin-bottom:14px;}
  .exp-sec h3{margin:0 0 12px;font-size:14px;color:#005a9e;}

  /* =========================================
     BILL LIST VIEW
  ========================================= */
  .toolbar{
    display:flex;gap:9px;flex-wrap:wrap;align-items:center;
    margin-bottom:16px;padding:14px;
    background:#f8f9fa;border-radius:11px;border:1px solid #dee2e6;
  }
  .srch{flex:1;min-width:180px;position:relative;}
  .srch input{
    width:100%;padding:10px 13px 10px 36px;
    border:1.5px solid #dee2e6;border-radius:8px;
    font-size:14px;font-family:inherit;box-sizing:border-box;background:#fff;
  }
  .srch::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
  .tbtn{
    padding:9px 16px;border-radius:8px;border:none;
    font-weight:700;font-size:13px;cursor:pointer;
    font-family:inherit;transition:all .2s;
    display:flex;align-items:center;gap:5px;color:#fff;
  }
  .tbtn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.18);}
  .tbtn-new{background:linear-gradient(135deg,#28a745,#1e7e34);}
  .tbtn-print{background:linear-gradient(135deg,#007bff,#005a9e);}
  .tbtn-paid{background:linear-gradient(135deg,#28a745,#1e7e34);}
  .tbtn-exp{background:linear-gradient(135deg,#17a2b8,#117a8b);}

  .file-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:9px;}
  .file-row input[type=file]{flex:1;font-size:13px;}
  select#export_format{
    padding:9px 11px;border:1.5px solid #dee2e6;border-radius:8px;
    font-family:inherit;font-size:13px;color:#495057;background:#fff;
  }

  /* Bill list table */
  .blt{width:100%;border-collapse:separate;border-spacing:0 7px;}
  .blt th{
    background:#005a9e;color:#fff;font-weight:700;
    padding:11px 13px;text-align:left;font-size:12px;
    text-transform:uppercase;letter-spacing:.4px;
  }
  .blt th:first-child{border-radius:8px 0 0 8px;}
  .blt th:last-child{border-radius:0 8px 8px 0;}
  .blt td{
    background:#fff;padding:11px 13px;font-size:13px;
    border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;
  }
  .blt td:first-child{border-left:1px solid #f0f0f0;border-radius:8px 0 0 8px;}
  .blt td:last-child{border-right:1px solid #f0f0f0;border-radius:0 8px 8px 0;}
  .blt tbody tr{box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .2s;}
  .blt tbody tr:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,90,158,.12);}

  .action-buttons{display:flex;gap:5px;flex-wrap:wrap;}
  .view-btn{padding:7px 13px;background:linear-gradient(135deg,#007bff,#005a9e);color:#fff;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
  .edit-btn{padding:7px 13px;background:linear-gradient(135deg,#ffc107,#e0a800);color:#1a1a1a;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
  .delete-btn{padding:7px 13px;background:linear-gradient(135deg,#dc3545,#c82333);color:#fff;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
  .view-btn:hover,.edit-btn:hover,.delete-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.2);}

  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}
  .status-dot.unpaid{background:#dc3545;}
  .status-dot.paid{background:#28a745;}
  .status-dot.partially-paid{background:#ffc107;}

  .pgn{display:flex;justify-content:center;align-items:center;gap:13px;margin-top:16px;}
  .pgn span{font-weight:700;color:#005a9e;}
  .filter-btn{padding:8px 16px;border-radius:8px;border:none;background:linear-gradient(135deg,#007bff,#005a9e);color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;}
  .filter-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,90,158,.28);}

  /* Switch (keep same) */
  .switch{position:relative;display:inline-block;width:52px;height:28px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:#ccc;transition:.35s;border-radius:28px;}
  .slider:before{position:absolute;content:"";height:20px;width:20px;left:4px;bottom:4px;background:#fff;transition:.35s;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  input:checked+.slider{background:#005a9e;}
  input:checked+.slider:before{transform:translateX(24px);}

  /* Toggle container for deductions */
  .toggle-container{display:inline-flex;align-items:center;gap:12px;font-weight:700;font-size:14px;}

  /* Expense rows */
  .expense-row{display:flex;gap:9px;align-items:center;margin-bottom:9px;}
  .expense-row input[type=text]{flex:2;padding:10px 12px;border:1.5px solid #dee2e6;border-radius:8px;font-size:14px;font-family:inherit;}
  .expense-row input[type=number]{flex:1;padding:10px 12px;border:1.5px solid #dee2e6;border-radius:8px;font-size:14px;font-family:inherit;}
  .remove-expense-btn{padding:10px 14px;background:linear-gradient(135deg,#dc3545,#c82333);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
  .add-expense-btn{padding:10px 16px;background:linear-gradient(135deg,#28a745,#1e7e34);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;}

  /* Loading */
  #loading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#005a9e,#00c6ff);z-index:9999;width:0;transition:width 1.5s linear;}
  #loading-bar.active{width:100%;}
  .hidden{display:none;}

  /* Autocomplete */
  #autocomplete-container{position:relative;}
  .autocomplete-items{position:absolute;border:1.5px solid #dee2e6;border-top:none;z-index:999;top:100%;left:0;right:0;background:#fff;border-radius:0 0 8px 8px;box-shadow:0 4px 18px rgba(0,90,158,.13);max-height:200px;overflow-y:auto;}
  .autocomplete-items div{padding:10px 13px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:14px;transition:background .2s;}
  .autocomplete-items div:hover{background:#e7f3ff;color:#005a9e;}

  /* Selection summary */
  #selection-summary{background:#e7f3ff;border:1px solid #b3d4f5;color:#005a9e;padding:10px;margin-bottom:13px;border-radius:8px;text-align:center;font-size:1em;display:none;}

  /* Responsive */
  /* ── Product Template Selector ── */
  .no-template-banner {
    padding: 12px 16px; background: #fff8e1; border: 1.5px solid #ffe08a;
    border-radius: 9px; color: #a8710a; font-size: 13px; font-weight: 600;
  }
  .no-template-banner a { color: #005a9e; font-weight: 700; }
  .product-select-row { display: flex; align-items: center; gap: 12px; }
  .product-select-row label { font-weight: 700; font-size: 13px; color: #495057; white-space: nowrap; }
  .product-select-row select {
    flex: 1; padding: 11px 13px; border: 1.5px solid #dee2e6; border-radius: 8px;
    font-size: 15px; font-family: inherit; background: #fafbff;
  }
  .product-select-row select:focus { border-color: #005a9e; outline: none; box-shadow: 0 0 0 3px rgba(0,90,158,.1); }
  .series-preview-text { margin-top: 8px; font-size: 12px; color: #6c757d; font-style: italic; }

  /* ── Template Deductions in Bill Form ── */
  .tpl-deductions-box { margin-top: 14px; display: flex; flex-direction: column; gap: 12px; }
  .tpl-ded-group {
    background: #f8f9fa; border: 1.5px solid #dee2e6; border-radius: 10px; padding: 12px 14px;
  }
  .tpl-ded-group-title { font-weight: 800; font-size: 12px; color: #005a9e; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 10px; }
  .tpl-ded-field {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #eee;
  }
  .tpl-ded-field:last-child { border-bottom: none; }
  .tpl-ded-toggle-label { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; flex: 1; cursor: pointer; }
  .tpl-ded-field.fixed > span { flex: 1; font-weight: 700; font-size: 13px; }
  .tpl-ded-value-input {
    width: 90px; padding: 7px 10px; border: 1.5px solid #dee2e6; border-radius: 7px;
    font-size: 13px; font-family: inherit; text-align: center;
  }
  .tpl-ded-unit { font-size: 11px; color: #6c757d; font-weight: 600; min-width: 50px; }

  /* ── Phase 2: Edit Mode Highlight ── */
  #bill_creation_form.edit-mode-active {
    border: 2px solid #fd7e14;
    border-radius: 16px;
    padding: 16px;
    background: #fff8f0;
    box-shadow: 0 0 0 4px rgba(253,126,20,.12);
  }
  .edit-mode-banner {
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, #fd7e14, #e8590c);
    color: #fff; padding: 12px 18px; border-radius: 10px;
    font-weight: 700; font-size: 14px; margin-bottom: 16px;
    box-shadow: 0 3px 12px rgba(253,126,20,.3);
  }
  .edit-cancel-btn {
    margin-left: auto; padding: 6px 14px;
    background: rgba(255,255,255,.2); color: #fff;
    border: 1px solid rgba(255,255,255,.4); border-radius: 7px;
    font-weight: 700; font-size: 12px; cursor: pointer;
    font-family: inherit; transition: all .2s;
  }
  .edit-cancel-btn:hover { background: rgba(255,255,255,.35); }

  @media(max-width:640px){
    .top-navbar{padding:0 12px;height:56px;}
    .navbar-brand span{font-size:.95em;}
    .navbar-links .nav-link span:not(:first-child){display:none;}
    .nav-link{padding:7px 9px;}
    .qnav{grid-template-columns:repeat(3,1fr);gap:9px;}
    .qcard{padding:13px 8px;font-size:12px;}
    .qcard .ci{font-size:22px;}
    .landing-hero{flex-direction:column;padding:18px;}
    .hero-right{text-align:left;}
    .hero-stats{gap:12px;}
    .hero-time{font-size:1.6em;}
    .fg2{grid-template-columns:1fr;}
    .bgrid{grid-template-columns:1fr;}
    .sc{padding:16px 14px;}
    .toolbar{flex-direction:column;align-items:stretch;}
    .tbtn{justify-content:center;}
    .blt{font-size:12px;}
    .blt th,.blt td{padding:9px 8px;}
    .action-buttons{flex-direction:column;}
    .action-buttons button{width:100%;}
  }
  
  /* ── Theme Switcher ── */
  .theme-switcher-wrap { display:flex; align-items:center; gap:6px; margin-left:8px; }
  .theme-dot {
    width:20px; height:20px; border-radius:50%; border:2px solid rgba(255,255,255,0.3);
    cursor:pointer; transition:all .2s; padding:0; flex-shrink:0;
  }
  .theme-dot:hover { transform:scale(1.2); border-color:rgba(255,255,255,0.8); }
  .theme-dot.active { border-color:#fff; transform:scale(1.25); box-shadow:0 0 0 2px rgba(255,255,255,0.5); }
  .theme-btn {
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25);
    color:#fff; border-radius:8px; padding:6px 12px; font-size:12px;
    font-weight:700; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; gap:6px; transition:all .2s;
  }
  .theme-btn:hover { background:rgba(255,255,255,0.22); }
  .theme-panel {
    position:absolute; top:70px; right:16px;
    background:#fff; border-radius:14px; padding:16px;
    box-shadow:0 8px 32px rgba(0,0,0,.2); z-index:9999;
    display:none; min-width:200px;
  }
  .theme-panel.open { display:block; }
  .theme-panel-title { font-weight:800; font-size:13px; color:#005a9e; margin-bottom:12px; text-transform:uppercase; letter-spacing:.4px; }
  #theme-switcher { display:flex; flex-wrap:wrap; gap:8px; }

  </style>

</head>
