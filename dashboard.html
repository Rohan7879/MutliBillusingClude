<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Dashboard — Ganesh Agri</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <script src="js/core/firebase-init.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/features/dashboard.js" defer></script>
    <link rel="icon" href="assets/logo.jpg" type="image/x-icon" />
    <style>
      /* ── TOP NAVBAR ── */
      .top-navbar {
        position: sticky; top: 0; z-index: 1000;
        background: linear-gradient(135deg, #003d6e, #005a9e);
        box-shadow: 0 4px 20px rgba(0,62,110,0.35);
        padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
        height: 64px; margin: -20px -16px 28px;
      }
      .navbar-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
      .navbar-brand img { height: 40px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.3); }
      .navbar-brand span { color: white; font-size: 1.2em; font-weight: 800; }
      .navbar-links { display: flex; gap: 6px; align-items: center; }
      .nav-link {
        display: flex; align-items: center; gap: 7px;
        padding: 8px 14px; border-radius: 8px;
        color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 600;
        text-decoration: none; border: none; background: transparent;
        cursor: pointer; transition: all 0.2s; font-family: inherit;
      }
      .nav-link:hover { background: rgba(255,255,255,0.15); color: white; }
      .nav-link.active { background: rgba(255,255,255,0.22); color: white; }
      @media(max-width:640px){
        .navbar-links .nav-link span:not(.nav-icon){display:none;}
        .top-navbar{padding:0 12px;}
      }

      /* ── PAGE ── */
      .page-wrapper { max-width: 960px; margin: 0 auto; }

      /* ── SECTION CARD ── */
      .section-card {
        background: white; border-radius: 16px; padding: 24px 26px;
        margin-bottom: 20px; border: 1px solid #dee2e6;
        box-shadow: 0 2px 12px rgba(0,90,158,0.07);
      }
      .section-card-title {
        display: flex; align-items: center; gap: 10px;
        font-size: 1em; font-weight: 800; color: #005a9e;
        margin: 0 0 18px; padding-bottom: 12px;
        border-bottom: 2px solid #e7f3ff;
        text-transform: uppercase; letter-spacing: 0.5px;
      }

      /* ── FILTERS ── */
      .filters-grid {
        display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      }
      .filters-grid input[type="text"] {
        flex: 1; min-width: 200px; padding: 10px 14px;
        border: 1.5px solid #dee2e6; border-radius: 8px;
        font-size: 14px; font-family: inherit;
      }
      .filters-grid input[type="date"] {
        padding: 9px 12px; border: 1.5px solid #dee2e6;
        border-radius: 8px; font-size: 14px; font-family: inherit;
      }
      .filter-btn {
        padding: 9px 16px; border-radius: 8px; border: none;
        background: linear-gradient(135deg, #007bff, #005a9e);
        color: white; font-weight: 700; font-size: 13px;
        cursor: pointer; transition: all 0.2s; font-family: inherit;
      }
      .filter-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,90,158,0.3); }
      .preset-btns { display: flex; gap: 6px; flex-wrap: wrap; }
      .preset-btn {
        padding: 8px 14px; border-radius: 20px; border: 2px solid #dee2e6;
        background: white; font-weight: 700; font-size: 13px;
        cursor: pointer; transition: all 0.2s; font-family: inherit; color: #495057;
      }
      .preset-btn:hover, .preset-btn.active {
        background: linear-gradient(135deg, #005a9e, #003d6e);
        color: white; border-color: #005a9e;
        box-shadow: 0 3px 10px rgba(0,90,158,0.25);
      }

      /* ── KPI CARDS ── */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 14px; margin-bottom: 20px;
      }
      .kpi-card {
        background: white; padding: 20px 16px;
        border-radius: 14px; text-align: center;
        border: 1px solid #e9ecef;
        box-shadow: 0 3px 12px rgba(0,90,158,0.08);
        transition: transform 0.2s, box-shadow 0.2s;
        position: relative; overflow: hidden;
      }
      .kpi-card::before {
        content: "";
        position: absolute; top: 0; left: 0; right: 0;
        height: 4px;
      }
      .kpi-card:nth-child(1)::before { background: linear-gradient(90deg,#005a9e,#00c6ff); }
      .kpi-card:nth-child(2)::before { background: linear-gradient(90deg,#dc3545,#ff6b6b); }
      .kpi-card:nth-child(3)::before { background: linear-gradient(90deg,#28a745,#56cf76); }
      .kpi-card:nth-child(4)::before { background: linear-gradient(90deg,#6f42c1,#a78bfa); }
      .kpi-card:nth-child(5)::before { background: linear-gradient(90deg,#17a2b8,#5ce1e6); }
      .kpi-card:nth-child(6)::before { background: linear-gradient(90deg,#ffc107,#ffe066); }
      .kpi-card:nth-child(7)::before { background: linear-gradient(90deg,#fd7e14,#ffb347); }
      .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,90,158,0.13); }
      .kpi-label { font-size: 13px; color: #6c757d; font-weight: 600; margin-bottom: 8px; }
      .kpi-value { font-size: 1.7em; font-weight: 800; color: #005a9e; }

      /* ── BILL TABLE ── */
      .bill-list-table { width: 100%; border-collapse: separate; border-spacing: 0 7px; }
      .bill-list-table th {
        background: #005a9e; color: white; font-weight: 700;
        padding: 12px 13px; text-align: left; font-size: 12px;
        text-transform: uppercase; letter-spacing: 0.4px;
      }
      .bill-list-table th:first-child { border-radius: 8px 0 0 8px; }
      .bill-list-table th:last-child  { border-radius: 0 8px 8px 0; }
      .bill-list-table td {
        background: white; padding: 12px 13px; font-size: 14px;
        border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0;
      }
      .bill-list-table td:first-child { border-left: 1px solid #f0f0f0; border-radius: 8px 0 0 8px; }
      .bill-list-table td:last-child  { border-right: 1px solid #f0f0f0; border-radius: 0 8px 8px 0; }
      .bill-list-table tbody tr { box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; }
      .bill-list-table tbody tr:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(0,90,158,0.12); }

      .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
      .view-btn   { padding:8px 14px; background:linear-gradient(135deg,#007bff,#005a9e); color:white; border:none; border-radius:7px; font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
      .delete-btn { padding:8px 14px; background:linear-gradient(135deg,#dc3545,#c82333); color:white; border:none; border-radius:7px; font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
      .view-btn:hover,.delete-btn:hover { transform:translateY(-1px); box-shadow:0 3px 10px rgba(0,0,0,0.2); }

      .status-dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; }
      .status-dot.unpaid { background:#dc3545; }
      .status-dot.paid   { background:#28a745; }
      .status-dot.partially-paid { background:#ffc107; }

      /* Pagination */
      .pagination-row { display:flex; justify-content:center; align-items:center; gap:14px; margin-top:18px; }
      .pagination-row span { font-weight:700; color:#005a9e; }

      /* Sync */
      #dashboard_sync_status { text-align:center; font-size:16px; font-weight:600; color:#28a745; margin-bottom:12px; }

      /* Modal */
      .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:10000; display:flex; justify-content:center; align-items:center; backdrop-filter:blur(2px); }
      .modal-content { background:white; padding:28px; border-radius:16px; width:92%; max-width:820px; max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
      .modal-button-container { display:flex; gap:12px; margin-top:18px; }
      .modal-button-container .button { flex:1; padding:13px; font-size:15px; border-radius:8px; border:none; cursor:pointer; font-weight:700; font-family:inherit; transition:all 0.2s; }
      #modal-download-btn { background:linear-gradient(135deg,#005a9e,#003d6e); color:white; }
      .close-modal-btn { background:#e9ecef; color:#495057; }
      .close-modal-btn:hover { background:#ced4da; }
    </style>
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="top-navbar">
      <a class="navbar-brand" href="index.html">
        <img src="assets/logo.jpg" alt="Logo" />
        <span>Ganesh Agri</span>
      </a>
      <div class="navbar-links">
        <a class="nav-link" href="index.html"><span class="nav-icon">🧾</span><span>New Bill</span></a>
        <a class="nav-link" href="index.html" onclick="showBillListView()"><span class="nav-icon">📋</span><span>Bills</span></a>
        <a class="nav-link active" href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a>
        <a class="nav-link" href="ledger.html"><span class="nav-icon">📒</span><span>Ledger</span></a>
        <a class="nav-link" href="core_settings.html"><span class="nav-icon">⚙️</span><span>Settings</span></a>
      </div>
    </nav>

    <div id="loading-bar" class="loading-bar hidden"></div>

    <div class="page-wrapper">

      <div id="dashboard_sync_status"></div>

      <!-- FILTERS -->
      <div class="section-card">
        <div class="section-card-title"><span>🔍</span> Filters</div>
        <div class="filters-grid">
          <input type="text" id="search_input" placeholder="🔍 Search by name, village, or vehicle..." />
          <input type="date" id="start_date" />
          <span style="font-weight:700; color:#6c757d;">to</span>
          <input type="date" id="end_date" />
          <button class="filter-btn" id="custom_date_filter_btn">Apply</button>
          <input type="month" id="month_year_input" style="padding:9px 12px; border:1.5px solid #dee2e6; border-radius:8px; font-size:14px; font-family:inherit;" />
          <button class="filter-btn" id="month_filter_btn">By Month</button>
        </div>
        <div class="preset-btns" style="margin-top:12px;">
          <button class="preset-btn" id="today_btn">📅 Today</button>
          <button class="preset-btn" id="last7days_btn">📅 Last 7 Days</button>
          <button class="preset-btn" id="month_btn">📅 This Month</button>
          <button class="preset-btn" id="year_btn">📅 This Year</button>
        </div>
      </div>

      <!-- KPI CARDS -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">💰 Total Purchases</div>
          <div class="kpi-value" id="kpi-total-purchases">₹0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">⏳ Total Amount Due</div>
          <div class="kpi-value" id="kpi-total-due">₹0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">⚖️ Total Net Weight</div>
          <div class="kpi-value" id="kpi-total-weight">0 kg</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">🧾 Total Bills</div>
          <div class="kpi-value" id="kpi-total-bills">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">🧺 Total Bags (કટ્ટા)</div>
          <div class="kpi-value" id="kpi-total-bags">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">🚛 Total Utrāī</div>
          <div class="kpi-value" id="kpi-total-utrai">₹0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">📈 Avg. Price / 20kg</div>
          <div class="kpi-value" id="kpi-avg-price">₹0</div>
        </div>
      </div>

      <!-- BILL LIST -->
      <div class="section-card" id="bill-list-section">
        <div class="section-card-title">
          <span>📋</span> Purchase Bills
          <button type="button" class="filter-btn" onclick="printSelectedBills()" style="margin-left:auto; padding:8px 16px;">🖨️ Print Selected</button>
        </div>

        <table class="bill-list-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="select_all_bills" onchange="toggleSelectAll(this)" /></th>
              <th>Bill No.</th>
              <th>Date</th>
              <th>Name</th>
              <th>Status</th>
              <th>Type</th>
              <th>Final Total</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="dashboard_bill_list_body"></tbody>
        </table>

        <div class="pagination-row">
          <button id="prev_page_btn" class="filter-btn">← Prev</button>
          <span id="page_info">Page 1 of 1</span>
          <button id="next_page_btn" class="filter-btn">Next →</button>
        </div>
      </div>

    </div><!-- end page-wrapper -->

    <!-- View Bill Modal -->
    <div id="view-bill-modal" class="modal-overlay" style="display:none;">
      <div class="modal-content">
        <div id="modal-bill-content"></div>
        <div class="modal-button-container">
          <button id="modal-download-btn" class="button">⬇️ Download PDF</button>
          <button onclick="closeBillView()" class="button close-modal-btn">✕ Close</button>
        </div>
      </div>
    </div>
    <div id="pdf-render-container" style="display:none;"></div>

  </body>
</html>
